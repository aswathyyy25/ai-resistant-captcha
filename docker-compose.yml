version: '3'

services:
  backend:
    image: my-backend-image
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/mydatabase
    depends_on:
      - db

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

  db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydatabase
    ports:
      - '5432:5432'